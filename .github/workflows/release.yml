name: Release artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Run release gate
        run: ./scripts/release_check.sh

      - name: Build release artifacts
        run: python3 scripts/build_release_artifacts.py --output-dir dist/release

      - name: Run clean-checkout smoke
        run: ./scripts/clean_checkout_smoke.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumi-social-intelligence-release-artifacts
          path: |
            dist/release/lumi-social-intelligence-0.1.0-rc.1.zip
            dist/release/release-manifest.json
            dist/release/SHA256SUMS

      - name: Attach artifacts to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release/lumi-social-intelligence-0.1.0-rc.1.zip
            dist/release/release-manifest.json
            dist/release/SHA256SUMS
